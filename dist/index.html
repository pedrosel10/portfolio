<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>3D Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
      @media (max-width: 768px) {
        #portfolio-view > div {
          padding: 60px 0 !important;
          gap: 40px !important;
        }
        #portfolio-view img {
          max-width: 60% !important;
          border-radius: 8px !important;
        }
        #toggle-fold {
          bottom: 20px !important;
          font-size: 14px !important;
          padding: 10px 20px !important;
        }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-CnFLTy1a.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BfXq-nKO.css">
  </head>
  <body>
    <button id="toggle-fold" style="position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 5; padding: 12px 24px; font-family: 'Playfair Display', serif; background: rgba(255,255,255,0.8); border: 1px solid #000; border-radius: 30px; font-size: 16px; cursor: pointer; backdrop-filter: blur(5px); transition: all 0.3s ease;">Abrir / Fechar</button>
    <div id="app"></div>
    <!-- Transition Layer for Crossfade -->
    <div id="transition-layer" style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:#000; z-index:999; opacity:0; pointer-events:none;"></div>
  <div id="portfolio-view" style="display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; overflow-y: auto; background: transparent; opacity: 0; pointer-events: none;">
      <button id="close-portfolio" style="position: fixed; top: 20px; right: 20px; padding: 10px 20px; z-index: 11; cursor: pointer; font-family: 'Playfair Display', serif; background: none; border: 1px solid #000; border-radius: 20px; font-size: 16px;">Voltar</button>
      <div style="display: flex; flex-direction: column; align-items: center; padding: 100px 0; gap: 80px; max-width: 1200px; margin: 0 auto;">
        <img src="./12802.jpg" style="max-width: 60%; width: 100%; object-fit: cover; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);" />
        <img src="./1644.jpg" style="max-width: 60%; width: 100%; object-fit: cover; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);" />
        <img src="./29038.jpg" style="max-width: 60%; width: 100%; object-fit: cover; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);" />
        <img src="./12802.jpg" style="max-width: 60%; width: 100%; object-fit: cover; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);" />
      </div>
    </div>
